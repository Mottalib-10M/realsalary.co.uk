<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>UK Salary Calculator Widget - Real Salary</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1f2937;
      line-height: 1.5;
    }
    .widget {
      max-width: 380px;
      margin: 0 auto;
      padding: 24px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #ffffff;
    }
    .widget-title {
      font-size: 18px;
      font-weight: 700;
      color: #1e3561;
      margin-bottom: 4px;
    }
    .widget-subtitle {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 16px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrap .prefix {
      position: absolute;
      left: 12px;
      font-size: 14px;
      color: #6b7280;
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      padding: 10px 12px 10px 28px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-wrap input:focus { border-color: #1e3561; }
    .region-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .region-btn {
      flex: 1;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: all 0.15s;
      color: #374151;
    }
    .region-btn.active {
      background: #1e3561;
      color: #fff;
      border-color: #1e3561;
    }
    .results {
      background: #f0f4f8;
      border-radius: 10px;
      padding: 16px;
      margin-top: 8px;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
      color: #4b5563;
    }
    .result-row.main {
      font-size: 16px;
      font-weight: 700;
      color: #1e3561;
      padding: 8px 0;
      border-top: 1px solid #d1d5db;
      margin-top: 4px;
    }
    .result-row .label { color: #6b7280; }
    .result-row .value { font-weight: 600; }
    .powered {
      text-align: center;
      margin-top: 14px;
      font-size: 11px;
      color: #9ca3af;
    }
    .powered a {
      color: #1e3561;
      text-decoration: none;
      font-weight: 600;
    }
    .powered a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="widget">
    <div class="widget-title">UK Salary Calculator</div>
    <div class="widget-subtitle">2026/27 tax year &middot; HMRC rates</div>

    <div class="field">
      <label for="salary">Annual gross salary</label>
      <div class="input-wrap">
        <span class="prefix">&pound;</span>
        <input type="text" id="salary" inputmode="numeric" value="30,000" />
      </div>
    </div>

    <div class="region-row">
      <button class="region-btn active" data-region="england" type="button">England</button>
      <button class="region-btn" data-region="scotland" type="button">Scotland</button>
    </div>

    <div class="results" id="results">
      <div class="result-row"><span class="label">Income Tax</span><span class="value" id="r-tax"></span></div>
      <div class="result-row"><span class="label">National Insurance</span><span class="value" id="r-ni"></span></div>
      <div class="result-row main"><span class="label">Monthly Take-Home</span><span class="value" id="r-monthly"></span></div>
      <div class="result-row main"><span class="label">Annual Take-Home</span><span class="value" id="r-annual"></span></div>
    </div>

    <div class="powered">
      Powered by <a href="https://realsalary.co.uk/?utm_source=widget" target="_blank" rel="noopener">Real Salary</a>
    </div>
  </div>

  <script>
    (function () {
      // 2026/27 tax rules
      const PA = 12570;
      const PA_TAPER_START = 100000;
      const PA_ZERO_AT = 125140;

      const engBands = [
        { from: 0, to: 12570, rate: 0 },
        { from: 12570, to: 50270, rate: 0.20 },
        { from: 50270, to: 125140, rate: 0.40 },
        { from: 125140, to: Infinity, rate: 0.45 },
      ];
      const scotBands = [
        { from: 0, to: 12570, rate: 0 },
        { from: 12570, to: 16537, rate: 0.19 },
        { from: 16537, to: 29526, rate: 0.20 },
        { from: 29526, to: 43662, rate: 0.21 },
        { from: 43662, to: 75000, rate: 0.42 },
        { from: 75000, to: 125140, rate: 0.45 },
        { from: 125140, to: Infinity, rate: 0.48 },
      ];

      const NI_PT = 12570;
      const NI_UEL = 50270;
      const NI_MAIN = 0.08;
      const NI_ADD = 0.02;

      let region = 'england';

      function getPA(gross) {
        if (gross <= PA_TAPER_START) return PA;
        const reduction = Math.floor((gross - PA_TAPER_START) / 2);
        return Math.max(0, PA - reduction);
      }

      function calcTax(gross, bands) {
        const pa = getPA(gross);
        const adjustedBands = bands.map(function (b, i) {
          if (i === 0) return { from: 0, to: pa, rate: 0 };
          if (i === 1) return { from: pa, to: b.to, rate: b.rate };
          return b;
        });
        let tax = 0;
        for (var i = 0; i < adjustedBands.length; i++) {
          var b = adjustedBands[i];
          if (gross <= b.from) break;
          var taxable = Math.min(gross, b.to) - b.from;
          if (taxable > 0) tax += taxable * b.rate;
        }
        return Math.round(tax * 100) / 100;
      }

      function calcNI(gross) {
        var ni = 0;
        if (gross > NI_PT) {
          var mainBand = Math.min(gross, NI_UEL) - NI_PT;
          ni += mainBand * NI_MAIN;
        }
        if (gross > NI_UEL) {
          ni += (gross - NI_UEL) * NI_ADD;
        }
        return Math.round(ni * 100) / 100;
      }

      function fmt(n) {
        return '£' + n.toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
      }

      function update() {
        var raw = document.getElementById('salary').value.replace(/[^0-9]/g, '');
        var gross = parseInt(raw, 10) || 0;
        var bands = region === 'scotland' ? scotBands : engBands;
        var tax = calcTax(gross, bands);
        var ni = calcNI(gross);
        var net = gross - tax - ni;
        document.getElementById('r-tax').textContent = fmt(tax);
        document.getElementById('r-ni').textContent = fmt(ni);
        document.getElementById('r-monthly').textContent = fmt(Math.round(net / 12));
        document.getElementById('r-annual').textContent = fmt(net);
      }

      // Format input with commas
      var input = document.getElementById('salary');
      input.addEventListener('input', function () {
        var raw = this.value.replace(/[^0-9]/g, '');
        if (raw) {
          var cursor = this.selectionStart;
          var oldLen = this.value.length;
          this.value = parseInt(raw, 10).toLocaleString('en-GB');
          var newLen = this.value.length;
          this.setSelectionRange(cursor + (newLen - oldLen), cursor + (newLen - oldLen));
        }
        update();
      });

      // Region buttons
      var btns = document.querySelectorAll('.region-btn');
      for (var i = 0; i < btns.length; i++) {
        btns[i].addEventListener('click', function () {
          for (var j = 0; j < btns.length; j++) btns[j].classList.remove('active');
          this.classList.add('active');
          region = this.getAttribute('data-region');
          update();
        });
      }

      update();
    })();
  </script>
</body>
</html>
